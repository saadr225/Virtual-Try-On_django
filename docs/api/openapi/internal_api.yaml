  /docs/client-api-spec/:
    get:
      tags:
        - Documentation
      summary: Get Client API Specification
      description: |
        Retrieve the OpenAPI specification YAML file for the Client API (VTON service).

        **Access:** Public - No authentication required

        **Format:** YAML only (application/x-yaml)

        **Usage:**
        - Download directly or display in browser
        - Import into Swagger UI, Redoc, or other OpenAPI tools
        - Use for API client generation

        The file is served directly without parsing, ensuring fast response times.
      operationId: getClientApiSpec
      security: []
      responses:
        "200":
          description: OpenAPI specification YAML file retrieved successfully
          content:
            application/x-yaml:
              schema:
                type: string
                format: binary
                description: Complete OpenAPI 3.0 specification in YAML format
          headers:
            Content-Type:
              description: YAML content type
              schema:
                type: string
                example: application/x-yaml
            Content-Disposition:
              description: Inline display (not download)
              schema:
                type: string
                example: inline; filename="client_api.yaml"
        "404":
          description: Specification file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: ERR000
                message: Unknown error code.
                detail: Client API specification file not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: SYS001
                message: Internal server error
                detail: An unexpected error occurred

