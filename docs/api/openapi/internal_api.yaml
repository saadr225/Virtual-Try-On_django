              type: integer
            admin:
              type: integer
        new_users_last_30_days:
          type: integer
        total_api_keys:
          type: integer
        active_api_keys:
          type: integer

    # New API Key Request Schemas
    ApiKeyRequestSubmitRequest:
      type: object
      required:
        - business_name
        - business_email
        - use_case
        - expected_usage
      properties:
        business_name:
          type: string
          maxLength: 200
          description: Name of business/organization
          example: "Fashion Store Ltd"
        business_email:
          type: string
          format: email
          description: Business contact email
          example: "api@fashionstore.com"
        use_case:
          type: string
          description: Detailed description of intended API usage
          example: "Virtual try-on integration for our e-commerce platform"
        expected_usage:
          type: string
          description: Expected monthly request volume
          example: "Approximately 10,000 requests per month"
        website:
          type: string
          format: uri
          description: Business website URL (optional)
          example: "https://fashionstore.com"
        additional_info:
          type: string
          description: Any additional information (optional)
          example: "We plan to integrate on all product pages"

    ApiKeyRequestDetail:
      type: object
      properties:
        request_id:
          type: string
          format: uuid
          description: Unique request identifier
        user:
          type: string
          description: Username of requester
        business_name:
          type: string
        business_email:
          type: string
          format: email
        use_case:
          type: string
        expected_usage:
          type: string
        website:
          type: string
          format: uri
        additional_info:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
          description: Current request status
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        # Approval fields (only if approved)
        approved_by:
          type: string
          nullable: true
          description: Username of approving staff/admin
        approved_at:
          type: string
          format: date-time
          nullable: true
        max_api_keys:
          type: integer
          nullable: true
          description: Maximum API keys granted
        user_monthly_quota:
          type: integer
          nullable: true
          description: Total monthly quota granted
        payment_date:
          type: string
          format: date
          nullable: true
        payment_proof:
          type: string
          nullable: true
          description: URL to payment proof file
        approved_use_case:
          type: string
          nullable: true
        admin_notes:
          type: string
          nullable: true
        # Rejection fields (only if rejected)
        rejected_by:
          type: string
          nullable: true
        rejected_at:
          type: string
          format: date-time
          nullable: true
        rejection_reason:
          type: string
          nullable: true

    ApiKeyRequestResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        request:
          $ref: "#/components/schemas/ApiKeyRequestDetail"

    ApiKeyRequestDetailResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        request:
          $ref: "#/components/schemas/ApiKeyRequestDetail"

    ApiKeyRequestListResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        requests:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyRequestDetail"
        pagination:
          $ref: "#/components/schemas/Pagination"

    AdminApiKeyRequestListResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        requests:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyRequestDetail"
        pagination:
          $ref: "#/components/schemas/Pagination"

    AdminApiKeyRequestDetailResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        request:
          $ref: "#/components/schemas/ApiKeyRequestDetail"

    ApiKeyRequestApprovalRequest:
      type: object
      required:
        - max_api_keys
        - user_monthly_quota
      properties:
        max_api_keys:
          type: integer
          minimum: 1
          default: 3
          description: Maximum number of API keys user can create
          example: 5
        user_monthly_quota:
          type: integer
          minimum: 1
          default: 10000
          description: Total monthly quota across all user's API keys
          example: 50000
        payment_date:
          type: string
          format: date
          description: Date when payment was received (optional)
          example: "2025-11-20"
        payment_proof:
          type: string
          format: binary
          description: Payment receipt/proof file upload (optional)
        admin_notes:
          type: string
          description: Internal notes about the approval (optional)
          example: "Approved for premium tier - annual subscription paid"
        approved_use_case:
          type: string
          description: Admin-approved description of use case (optional)
          example: "High-volume e-commerce integration"

    ApiKeyRequestRejectionRequest:
      type: object
      required:
        - rejection_reason
      properties:
        rejection_reason:
          type: string
          description: Reason for rejecting the request
          example: "Use case does not align with our service offerings"
        admin_notes:
          type: string
          description: Internal notes about the rejection (optional)
          example: "User requested features not available"

  # Common Schemas
  SuccessResponse:
    type: object
    properties:
      code:
        type: string
      message:
        type: string

  ErrorResponse:
    type: object
    properties:
      code:
        type: string
      message:
        type: string
      detail:
        type: string
        nullable: true
      errors:
        type: object
        nullable: true

  Pagination:
    type: object
    properties:
      page:
        type: integer
      limit:
        type: integer
      total:
        type: integer
      pages:
        type: integer

securitySchemes:
  bearerAuth:
    type: http
    scheme: bearer
    bearerFormat: JWT
    description: |
      JWT authentication. Include the access token in the Authorization header:
      ```
      Authorization: Bearer <access_token>
      ```

security:
  - bearerAuth: []
