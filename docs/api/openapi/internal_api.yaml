openapi: 3.0.3

info:
  title: VTON Internal API
  version: 1.0.0
  description: |
    Internal API for frontend application and admin panel.
    Handles user authentication, profile management, API key management, and admin operations.

    ## Authentication

    This API uses JWT (JSON Web Token) authentication. Most endpoints require authentication.

    ### JWT Token Format
    Include the JWT access token in the `Authorization` header:
    ```
    Authorization: Bearer eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
    ```

    ### Token Lifetimes
    - **Access Token**: Valid for 30 minutes
    - **Refresh Token**: Valid for 7 days
    - Token rotation is enabled for enhanced security

    ### Obtaining Tokens
    1. Use `/auth/login/` or `/auth/admin-login/` to get initial tokens
    2. Use `/auth/token/refresh/` to get new access tokens when they expire
    3. Use `/auth/logout/` to blacklist refresh tokens

    ### Admin Access
    Admin endpoints require additional admin privileges:
    - Django staff/superuser status, OR
    - UserData.user_type = 'admin'

    ## Rate Limiting
    API endpoints are subject to rate limiting to prevent abuse:
    - Authenticated endpoints: 1000 requests/hour per user
    - Unauthenticated endpoints: 100 requests/hour per IP

    ## Usage Notes
    - All API responses follow a standardized format with `code` and `message` fields
    - Use Postman or similar tools for testing - Swagger UI is disabled for security
    - All timestamps are in ISO 8601 format (UTC)
    - Pagination uses `page` and `limit` query parameters where applicable
  contact:
    name: API Support
    email: support@example.com
  license:
    name: Proprietary
  x-swagger-ui-config:
    displayOperationId: true
    tryItOutEnabled: false
    deepLinking: true
    presets:
      - SwaggerUIBundle.presets.apis
      - SwaggerUIBundle.SwaggerUIStandalonePreset
    layout: "StandaloneLayout"
  x-readme:
    explorer-enabled: false

tags:
  - name: Authentication
    description: User registration, login, logout, and token management
  - name: User Profile
    description: User profile information and management
  - name: API Keys
    description: API key creation, management, and statistics
  - name: API Key Requests
    description: Submit and manage API key access requests (Client)
  - name: Admin - API Key Requests
    description: Review and approve/reject API key requests (Staff/Admin)
  - name: Admin
    description: Administrative operations (admin users only)
  - name: Documentation
    description: OpenAPI specification endpoints

paths:
  # Authentication Endpoints
  /auth/register/:
    post:
      tags:
        - Authentication
      summary: Register New User Account
      description: |
        Create a new user account with profile information.

        **Authentication:** Not required (public endpoint)

        **Request Headers:** None required

        **Process:**
        1. Validates user input data
        2. Creates Django User and UserData records
        3. Sends email verification (if configured)
        4. Returns user information and success message

        **Note:** New accounts may require email verification before full access.

        **Example cURL Request:**
        ```bash
        curl -X POST "https://your-domain.com/internal/api/auth/register/" \
          -H "accept: application/json" \
          -H "Content-Type: application/json" \
          -d '{
            "username": "johndoe",
            "email": "john.doe@example.com",
            "password": "SecurePass123!",
            "password2": "SecurePass123!",
            "first_name": "John",
            "last_name": "Doe",
            "phone_number": "+1234567890",
            "user_type": "customer"
          }'
        ```
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              customerRegistration:
                summary: Register as customer
                value:
                  username: "johndoe"
                  email: "john.doe@example.com"
                  password: "SecurePass123!"
                  password2: "SecurePass123!"
                  first_name: "John"
                  last_name: "Doe"
                  phone_number: "+1234567890"
                  user_type: "customer"
      responses:
        "201":
          description: User account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
              examples:
                success:
                  summary: Successful registration
                  value:
                    code: "RESOURCE_CREATED"
                    message: "User created successfully"
                    user:
                      id: 1
                      username: "johndoe"
                      email: "john.doe@example.com"
                      first_name: "John"
                      last_name: "Doe"
                      is_active: true
                      date_joined: "2025-11-03T10:00:00Z"
                      user_type: "customer"
                      is_verified: false
        "400":
          description: Validation error - invalid input data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                validationError:
                  summary: Missing required fields
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Validation error"
                    errors:
                      username: ["This field is required."]
                      email: ["This field is required."]
        "409":
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "USR006"
                message: "This email is already registered"
                detail: "A user with this email address already exists"

  /auth/login/:
    post:
      tags:
        - Authentication
      summary: User Login
      description: |
        Authenticate user credentials and return JWT tokens.

        **Authentication:** Not required (public endpoint)

        **Request Headers:** None required

        **Process:**
        1. Validates username/email and password
        2. Checks account status (active, not suspended)
        3. Generates JWT access and refresh tokens
        4. Updates user's last login timestamp
        5. Returns user info and tokens

        **Token Usage:**
        - Use access token in `Authorization: Bearer <token>` header
        - Use refresh token with `/auth/token/refresh/` when access token expires
        - Store tokens securely (access token in memory, refresh token in httpOnly cookie if possible)

        **Example cURL Requests:**

        **Login with username:**
        ```bash
        curl -X POST "https://your-domain.com/internal/api/auth/login/" \
          -H "accept: application/json" \
          -H "Content-Type: application/json" \
          -d '{
            "username": "johndoe",
            "password": "SecurePass123!"
          }'
        ```

        **Login with email:**
        ```bash
        curl -X POST "https://your-domain.com/internal/api/auth/login/" \
          -H "accept: application/json" \
          -H "Content-Type: application/json" \
          -d '{
            "username": "john.doe@example.com",
            "password": "SecurePass123!"
          }'
        ```
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              usernameLogin:
                summary: Login with username
                value:
                  username: "johndoe"
                  password: "SecurePass123!"
              emailLogin:
                summary: Login with email
                value:
                  username: "john.doe@example.com"
                  password: "SecurePass123!"
      responses:
        "200":
          description: Login successful - returns JWT tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                success:
                  summary: Successful login
                  value:
                    code: "LOGIN_SUCCESS"
                    message: "Login successful"
                    user:
                      id: 1
                      username: "johndoe"
                      email: "john.doe@example.com"
                      first_name: "John"
                      last_name: "Doe"
                      is_active: true
                      date_joined: "2025-01-01T00:00:00Z"
                      last_login: "2025-11-03T10:00:00Z"
                      user_type: "customer"
                      is_verified: true
                      is_premium: false
                      premium_expiry: null
                      phone_number: "+1234567890"
                    access: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..."
                    refresh: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..."
        "400":
          description: Validation error - missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "AUT003"
                message: "Invalid email or password"
        "403":
          description: Account inactive or suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                accountInactive:
                  summary: Account deactivated
                  value:
                    code: "USR015"
                    message: "User account is inactive"
                accountSuspended:
                  summary: Account suspended
                  value:
                    code: "USR016"
                    message: "User account has been suspended"

  /auth/admin-login/:
    post:
      tags:
        - Authentication
      summary: Admin User Login
      description: |
        Authenticate admin users ONLY and return JWT tokens.
        This endpoint is specifically for admin users (staff, superuser, or user_type='admin').
        Regular users will be rejected even with valid credentials.

        **Example cURL Request:**
        ```bash
        curl -X POST "https://your-domain.com/internal/api/auth/admin-login/" \
          -H "accept: application/json" \
          -H "Content-Type: application/json" \
          -d '{
            "username": "admin",
            "password": "AdminPass123!"
          }'
        ```
      operationId: adminLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Admin login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                adminLoginSuccess:
                  summary: Successful admin login
                  value:
                    code: "LOGIN_SUCCESS"
                    message: "Login successful"
                    user:
                      id: 1
                      username: "admin_user"
                      email: "admin@example.com"
                      first_name: "Admin"
                      last_name: "User"
                      is_active: true
                      date_joined: "2025-01-01T00:00:00Z"
                      last_login: "2025-11-03T10:00:00Z"
                      user_type: "admin"
                      is_verified: true
                      is_premium: false
                      premium_expiry: null
                      phone_number: "+1234567890"
                    access: "eyJ0eXAiOiJKV1QiLCJhbGc..."
                    refresh: "eyJ0eXAiOiJKV1QiLCJhbGc..."
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access denied - valid user but not admin, account inactive, or suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notAdmin:
                  summary: Non-admin user attempted admin login
                  value:
                    code: "ACCESS_DENIED"
                    message: "Access denied"
                    detail: "This endpoint is for admin users only. Please use the regular login endpoint."

  /auth/logout/:
    post:
      tags:
        - Authentication
      summary: User Logout
      description: |
        Logout user and blacklist the refresh token.

        **Authentication:** Required (JWT access token)

        **Request Headers:**
        - `Authorization: Bearer <access_token>`

        **Process:**
        1. Validates the access token
        2. Blacklists the provided refresh token
        3. Logs the logout event
        4. Returns success response

        **Security Note:** 
        - Only the refresh token is blacklisted (not the access token)
        - Access tokens expire naturally after 30 minutes
        - For complete logout, clear tokens from client storage

        **Example cURL Request:**
        ```bash
        curl -X POST "https://your-domain.com/internal/api/auth/logout/" \
          -H "accept: application/json" \
          -H "Authorization: Bearer YOUR_ACCESS_TOKEN_HERE" \
          -H "Content-Type: application/json" \
          -d '{
            "refresh": "YOUR_REFRESH_TOKEN_HERE"
          }'
        ```
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh
              properties:
                refresh:
                  type: string
                  description: JWT refresh token to blacklist
                  example: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..."
            examples:
              logout:
                summary: Logout with refresh token
                value:
                  refresh: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..."
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                code: "LOGOUT_SUCCESS"
                message: "Logout successful"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidToken:
                  summary: Invalid refresh token
                  value:
                    code: "AUT001"
                    message: "Invalid or expired token"
                missingToken:
                  summary: Missing refresh token
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Validation error"
                    errors:
                      refresh: ["This field is required."]

  /auth/token/refresh/:
    post:
      tags:
        - Authentication
      summary: Refresh Access Token
      description: |
        Get a new access token using a valid refresh token.

        **Authentication:** Not required (uses refresh token in body)

        **Request Headers:** None required

        **Process:**
        1. Validates the refresh token
        2. Checks if token is not blacklisted
        3. Generates new access and refresh tokens
        4. Blacklists the old refresh token (rotation)
        5. Returns new token pair

        **Token Rotation:**
        - Old refresh token is automatically blacklisted
        - New refresh token has extended expiry (7 days from now)
        - Access token valid for 30 minutes

        **Usage Pattern:**
        ```
        // When access token expires (401 response)
        POST /auth/token/refresh/
        {
          "refresh": "old_refresh_token"
        }
        // Response contains new access and refresh tokens
        ```

        **Example cURL Request:**
        ```bash
        curl -X POST "https://your-domain.com/internal/api/auth/token/refresh/" \
          -H "accept: application/json" \
          -H "Content-Type: application/json" \
          -d '{
            "refresh": "YOUR_REFRESH_TOKEN_HERE"
          }'
        ```
      operationId: tokenRefresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh
              properties:
                refresh:
                  type: string
                  description: JWT refresh token
                  example: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..."
            examples:
              tokenRefresh:
                summary: Refresh access token
                value:
                  refresh: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..."
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenRefreshResponse"
              examples:
                success:
                  summary: Successful token refresh
                  value:
                    code: "DATA_RETRIEVED"
                    message: "Token refreshed successfully"
                    access: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...new"
                    refresh: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...new"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                expiredToken:
                  summary: Refresh token expired
                  value:
                    code: "AUT001"
                    message: "Invalid or expired token"
                blacklistedToken:
                  summary: Token was blacklisted
                  value:
                    code: "AUT001"
                    message: "Invalid or expired token"

  # User Profile Endpoints
  /auth/me/:
    get:
      tags:
        - User Profile
      summary: Get Current User Information
      description: |
        Retrieve detailed information about the currently authenticated user.

        **Authentication:** Required (JWT access token)

        **Request Headers:**
        - `Authorization: Bearer <access_token>`

        **Returns:**
        - Complete user profile information
        - Account status and permissions
        - Subscription/premium status
        - API key quotas and limits

        **Use Cases:**
        - Display user profile in frontend
        - Check account status and permissions
        - Display quota information
        - Populate user settings forms

        **Example cURL Request:**
        ```bash
        curl -X GET "https://your-domain.com/internal/api/auth/me/" \
          -H "accept: application/json" \
          -H "Authorization: Bearer YOUR_ACCESS_TOKEN_HERE"
        ```
      operationId: getUserInfo
      responses:
        "200":
          description: User information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"
              examples:
                userInfo:
                  summary: Complete user information
                  value:
                    code: "DATA_RETRIEVED"
                    message: "User information retrieved successfully"
                    user:
                      id: 1
                      username: "johndoe"
                      email: "john.doe@example.com"
                      first_name: "John"
                      last_name: "Doe"
                      is_active: true
                      date_joined: "2025-01-01T00:00:00Z"
                      last_login: "2025-11-03T10:00:00Z"
                      user_type: "customer"
                      is_verified: true
                      is_premium: false
                      premium_expiry: null
                      phone_number: "+1234567890"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/profile/:
    put:
      tags:
        - User Profile
      summary: Update User Profile (Full Update)
      description: |
        Update complete user profile information. All fields are required.

        **Authentication:** Required (JWT access token)

        **Request Headers:**
        - `Authorization: Bearer <access_token>`

        **Validation:**
        - Email must be unique if changed
        - Phone number format validation
        - Required fields cannot be empty

        **Process:**
        1. Validates all input data
        2. Updates user and UserData records
        3. Logs the profile update
        4. Returns updated user information

        **Example cURL Request:**
        ```bash
        curl -X PUT "https://your-domain.com/internal/api/auth/profile/" \
          -H "accept: application/json" \
          -H "Authorization: Bearer YOUR_ACCESS_TOKEN_HERE" \
          -H "Content-Type: application/json" \
          -d '{
            "first_name": "John",
            "last_name": "Smith",
            "email": "john.smith@example.com",
            "phone_number": "+1987654321"
          }'
        ```
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
            examples:
              fullUpdate:
                summary: Update all profile fields
                value:
                  first_name: "John"
                  last_name: "Smith"
                  email: "john.smith@example.com"
                  phone_number: "+1987654321"
                  company_name: "ABC Corp"
                  address_line1: "123 Main St"
                  address_line2: "Suite 100"
                  city: "New York"
                  state: "NY"
                  country: "USA"
                  postal_code: "10001"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags:
        - User Profile
      summary: Update User Profile (Partial Update)
      description: |
        Partially update user profile information. Only provided fields are updated.

        **Authentication:** Required (JWT access token)

        **Request Headers:**
        - `Authorization: Bearer <access_token>`

        **Use Cases:**
        - Update single field (e.g., just email)
        - Progressive profile completion
        - Settings updates

        **Note:** Same validation rules apply to updated fields.

        **Example cURL Request:**
        ```bash
        curl -X PATCH "https://your-domain.com/internal/api/auth/profile/" \
          -H "accept: application/json" \
          -H "Authorization: Bearer YOUR_ACCESS_TOKEN_HERE" \
          -H "Content-Type: application/json" \
          -d '{
            "email": "new.email@example.com"
          }'
        ```
      operationId: partialUpdateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
            examples:
              partialUpdate:
                summary: Update only email
                value:
                  email: "new.email@example.com"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"

  /auth/change-password/:
    post:
      tags:
        - User Profile
      summary: Change Password
      description: |
        Change the authenticated user's password.

        **Authentication:** Required (JWT access token)

        **Request Headers:**
        - `Authorization: Bearer <access_token>`

        **Security Requirements:**
        - Current password must be provided for verification
        - New password must be confirmed (password2)
        - Password strength requirements apply

        **Process:**
        1. Validates current password
        2. Validates new password strength and confirmation
        3. Updates password hash
        4. Logs password change event
        5. Returns success response

        **Security Note:** 
        - All active sessions remain valid after password change
        - Consider forcing re-login for enhanced security

        **Example cURL Request:**
        ```bash
        curl -X POST "https://your-domain.com/internal/api/auth/change-password/" \
          -H "accept: application/json" \
          -H "Authorization: Bearer YOUR_ACCESS_TOKEN_HERE" \
          -H "Content-Type: application/json" \
          -d '{
            "old_password": "CurrentPass123!",
            "new_password": "NewSecurePass456!",
            "new_password2": "NewSecurePass456!"
          }'
        ```
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
            examples:
              passwordChange:
                summary: Change user password
                value:
                  old_password: "CurrentPass123!"
                  new_password: "NewSecurePass456!"
                  new_password2: "NewSecurePass456!"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                code: "PASSWORD_RESET_SUCCESS"
                message: "Password changed successfully"
        "400":
          description: Validation error or incorrect old password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                wrongOldPassword:
                  summary: Incorrect current password
                  value:
                    code: "USR004"
                    message: "Current password is incorrect"
                passwordMismatch:
                  summary: New passwords don't match
                  value:
                    code: "USR010"
                    message: "Passwords do not match"
                    errors:
                      new_password2: ["Passwords do not match."]
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/delete-account/:
    post:
      tags:
        - User Profile
      summary: Delete User Account
      description: |
        Soft delete the authenticated user's account.

        **Authentication:** Required (JWT access token)

        **Request Headers:**
        - `Authorization: Bearer <access_token>`

        **Process:**
        1. Validates password confirmation
        2. Validates confirmation flag
        3. Soft deletes the account (marks as inactive)
        4. Logs account deletion event
        5. Blacklists all refresh tokens

        **Important Notes:**
        - This is a **soft delete** - account is deactivated, not permanently removed
        - All API keys are deactivated
        - Account can potentially be restored by administrators
        - All active sessions are terminated
        - Data is retained for compliance and audit purposes

        **Irreversible Actions:**
        - Account becomes unusable immediately
        - All API keys are permanently deactivated
        - Cannot be undone by user (requires admin intervention)

        **Example cURL Request:**
        ```bash
        curl -X POST "https://your-domain.com/internal/api/auth/delete-account/" \
          -H "accept: application/json" \
          -H "Authorization: Bearer YOUR_ACCESS_TOKEN_HERE" \
          -H "Content-Type: application/json" \
          -d '{
            "password": "CurrentPass123!",
            "confirm": true
          }'
        ```
      operationId: deleteAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - confirm
              properties:
                password:
                  type: string
                  description: Current password for confirmation
                  example: "CurrentPass123!"
                confirm:
                  type: boolean
                  description: Must be true to confirm deletion
                  example: true
            examples:
              deleteAccount:
                summary: Delete user account
                value:
                  password: "CurrentPass123!"
                  confirm: true
      responses:
        "200":
          description: Account deleted successfully
          content:
            application/json:
              schema:
