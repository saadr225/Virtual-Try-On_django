              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: ACCESS_DENIED
                message: Access denied
                detail: Admin privileges required to access this endpoint
        "404":
          description: Specification file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: ERR000
                message: Unknown error code.
                detail: Internal API specification file not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: SYS001
                message: Internal server error
                detail: An unexpected error occurred

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token authentication

  schemas:
    # Authentication Schemas
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
        - password2
        - first_name
        - last_name
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 150
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        password2:
          type: string
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string
        phone_number:
          type: string
          maxLength: 20
          description: Phone number (optional)
        user_type:
          type: string
          enum: [customer, store_owner, admin]
          default: customer
          description: Type of user account

    RegisterResponse:
      type: object
      properties:
        code:
          type: string
          example: RESOURCE_CREATED
        message:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        code:
          type: string
          example: LOGIN_SUCCESS
        message:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"
        access:
          type: string
          description: JWT access token (30 minutes validity)
        refresh:
          type: string
          description: JWT refresh token (7 days validity)

    TokenRefreshResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        access:
          type: string
        refresh:
          type: string

    # User Profile Schemas
    UserInfo:
      type: object
      properties:
        id:
          type: integer
          description: Unique user ID
        username:
          type: string
          description: User's username
        email:
          type: string
          format: email
          description: User's email address
        first_name:
          type: string
          description: User's first name
        last_name:
          type: string
          description: User's last name
        is_active:
          type: boolean
          description: Whether the user account is active
        date_joined:
          type: string
          format: date-time
          description: Date and time when user registered
        last_login:
          type: string
          format: date-time
          nullable: true
          description: Date and time of last login
        user_type:
          type: string
          enum: [customer, store_owner, admin]
          description: Type of user account
        is_verified:
          type: boolean
          description: Whether the user is verified
        is_premium:
          type: boolean
          description: Whether the user has premium status
        premium_expiry:
          type: string
          format: date-time
          nullable: true
          description: Premium subscription expiry date
        phone_number:
          type: string
          description: User's phone number

    UserData:
      type: object
      properties:
        user_type:
          type: string
          enum: [customer, store_owner, admin]
          description: Type of user account
        phone_number:
          type: string
          description: User's phone number
        company_name:
          type: string
          description: Company name (if applicable)
        is_verified:
          type: boolean
          description: Email verification status
        is_premium:
          type: boolean
          description: Premium subscription status
        premium_expiry:
          type: string
          format: date-time
          nullable: true
          description: Premium expiry date
        max_api_keys:
          type: integer
          description: Maximum API keys allowed
        current_api_keys_count:
          type: integer
          description: Current number of API keys
        api_key_generation_enabled:
          type: boolean
          description: Whether user can generate API keys

    UserInfoResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"

    UpdateProfileRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
        company_name:
          type: string
        address_line1:
          type: string
        address_line2:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        postal_code:
          type: string

    ChangePasswordRequest:
      type: object
      required:
        - old_password
        - new_password
        - new_password2
      properties:
        old_password:
          type: string
        new_password:
          type: string
          minLength: 8
        new_password2:
          type: string
          minLength: 8

    # API Key Schemas
    CreateApiKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Unique name for the API key
        expires_in_days:
          type: integer
          nullable: true
          description: Number of days until key expires (null = never expires)
      description: |
        Create a new API key. Non-admin users can only set the name and expires_in_days.

        Admin-only fields (ignored for non-admin users):
        - rate_limit_per_minute (default: 100)
        - rate_limit_per_hour (default: 1000)
        - rate_limit_per_day (default: 10000)
        - monthly_quota (default: 500)
        - allowed_domains (default: empty = all allowed)
        - allowed_ips (default: empty = all allowed)

    UpdateApiKeyRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active, inactive, suspended]
          description: API key status (non-admin users can only update this field)
      description: |
        Update API key settings. Non-admin users can only update the status field.

        Admin-only fields:
        - rate_limit_per_minute
        - rate_limit_per_hour
        - rate_limit_per_day
        - monthly_quota
        - allowed_domains
        - allowed_ips

    ApiKeyDetail:
      type: object
      properties:
        key_id:
          type: string
          format: uuid
        name:
          type: string
        api_key:
          type: string
          description: Full API key (only shown on creation/regeneration)
        api_key_preview:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        rate_limit_per_minute:
          type: integer
        rate_limit_per_hour:
          type: integer
        rate_limit_per_day:
          type: integer
        monthly_quota:
          type: integer
        total_requests:
          type: integer
        requests_this_month:
          type: integer
        allowed_domains:
          type: array
          items:
            type: string
        allowed_ips:
          type: array
          items:
            type: string

    ApiKeyDetailResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        api_key:
          $ref: "#/components/schemas/ApiKeyDetail"

    ApiKeyListResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        api_keys:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyDetail"
        pagination:
          $ref: "#/components/schemas/Pagination"

    ApiKeyStatsResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        stats:
          type: object
          properties:
            key_id:
              type: string
              format: uuid
            name:
              type: string
            total_requests:
              type: integer
            requests_this_month:
              type: integer
            requests_this_day:
              type: integer
            quota_remaining:
              type: integer
            last_used_at:
              type: string
              format: date-time
            status:
              type: string
            rate_limits:
              type: object

    QuotaInfoResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        quota_info:
          type: object
          properties:
            max_api_keys:
              type: integer
            current_api_keys:
              type: integer
            can_create_more:
              type: boolean
            api_key_generation_enabled:
              type: boolean
            user_monthly_quota:
              type: integer
            cumulative_quota_used:
              type: integer
            quota_remaining:
              type: integer
            default_rate_limits:
              type: object
            api_keys_summary:
              type: array
              items:
                type: object

    # Admin Schemas
    UpdateUserQuotaRequest:
      type: object
      properties:
        max_api_keys:
          type: integer
        api_key_generation_enabled:
          type: boolean
        user_monthly_quota:
          type: integer
        default_rate_limit_per_minute:
          type: integer
        default_rate_limit_per_hour:
          type: integer
        default_rate_limit_per_day:
          type: integer
        default_monthly_quota:
          type: integer

    UserQuotaResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        user_quota:
          type: object

    UserQuotaListResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        users:
          type: array
          items:
            type: object
        pagination:
          $ref: "#/components/schemas/Pagination"

    UserDetailsResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        user_details:
          type: object
          properties:
            user_info:
              type: object
            quota_info:
              type: object
            api_keys:
              type: array
              items:
                type: object
            activity_summary:
              type: object

    AdminUpdateApiKeyRequest:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
        rate_limit_per_minute:
          type: integer
        rate_limit_per_hour:
          type: integer
        rate_limit_per_day:
          type: integer
        monthly_quota:
          type: integer
        allowed_domains:
          type: array
          items:
            type: string
        allowed_ips:
          type: array
          items:
            type: string

    AdminApiKeyListResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        api_keys:
          type: array
          items:
            type: object
        pagination:
          $ref: "#/components/schemas/Pagination"

    # Common Schemas
    SuccessResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        detail:
          type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        pages:
          type: integer
